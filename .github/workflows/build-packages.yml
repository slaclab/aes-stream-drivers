# ----------------------------------------------------------------------------
# Title      : Targeted Binary Package Generation (.deb & .rpm)
# ----------------------------------------------------------------------------
# Compiles distribution-specific wrappers targeting explicit environments:
#  - Ubuntu 22.04 & 24.04 (Debian Packages via Loop)
#  - Rocky Linux 9 (RPM Packages)
# ----------------------------------------------------------------------------

name: Build Distribution Packages
on:
  workflow_dispatch: # Allows manual verification via the GitHub Actions tab

jobs:
  # ==========================================================================
  # Parallel Binary Package Compilation
  # ==========================================================================
  compile_dist_packages:
    name: "Compile Packages (${{ matrix.driver_type }} - ${{ matrix.format }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
        format: [deb-loop, rpm-rocky9]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Host Packaging Engines
        run: |
          sudo apt-get update
          sudo apt-get install -y dkms rpm linux-headers-$(uname -r)

      - name: Parse Metadata and Versioning
        id: meta
        run: |
          TAG_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0-test")
          CLEAN_VERSION=$(echo "${TAG_VERSION}" | sed 's/^v//')
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            echo "suffix=-gpu" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - name: Regenerate Temporary Source Tree for Packaging
        run: |
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            make -C data_dev/driver dkms_gpu || make -C data_dev/driver dkms TYPE=gpu || make -C data_dev/driver dkms
          else
            make -C data_dev/driver dkms
          fi

      - name: Normalize Tarball Architecture
        id: tarball_check
        run: |
          cd data_dev/driver
          ACTUAL_TARBALL=$(find . -maxdepth 1 -name "*.tar.gz" | head -n 1 | sed 's|^\./||')
          if [ -z "$ACTUAL_TARBALL" ]; then
            echo "ERROR: Target driver tarball failed to generate." && exit 1
          fi
          EXPECTED_TARBALL="datadev${{ steps.meta.outputs.suffix }}-dkms-${{ steps.meta.outputs.tag }}.tar.gz"
          if [ "$ACTUAL_TARBALL" != "$EXPECTED_TARBALL" ]; then
            mv "$ACTUAL_TARBALL" "$EXPECTED_TARBALL"
          fi
          echo "target_tarball=$EXPECTED_TARBALL" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------------
      # Track A: Ubuntu Debian Loop Generation (.deb)
      # ----------------------------------------------------------------------
      - name: Run Sequential Ubuntu Version Packaging Loop
        if: matrix.format == 'deb-loop'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TARBALL: ${{ steps.tarball_check.outputs.target_tarball }}
        run: |
          # Easily append newer Ubuntu tags here as they drop (e.g., "26.04")
          UBUNTU_VERSIONS=("22.04" "24.04")
          cd data_dev/driver
          
          for UVP in "${UBUNTU_VERSIONS[@]}"; do
             echo "========================================================="
             echo "Compiling Native Package targeting: Ubuntu $UVP"
             echo "========================================================="
             
             docker run --rm --privileged \
                -v "$(pwd)":/workspace \
                -v /lib/modules:/lib/modules \
                -v /usr/src:/usr/src \
                -w /workspace ubuntu:"$UVP" bash -c "
                apt-get update && \
                apt-get install -y debhelper dkms fakeroot make git linux-headers-generic && \
                dkms mkdeb --archive='$TARBALL' || true && \
                if [ -d 'dkms_binary' ]; then \
                   cp dkms_binary/*.deb ./datadev${SUFFIX}-dkms_${VERSION}_ubuntu-\${UVP}_all.deb; \
                else \
                   fakeroot dh_binary || true && \
                   ls *.deb | while read f; do mv \"\$f\" \"\${f%.deb}_ubuntu-\${UVP}.deb\"; done; \
                fi
             "
          done
          
          echo "=== Completed Debian Packages ==="
          ls -la *.deb 2>/dev/null || (echo "Compilation Error: No packages found." && exit 1)

      # ----------------------------------------------------------------------
      # Track B: Rocky Linux RPM Generation (.rpm)
      # ----------------------------------------------------------------------
      - name: Compile Rocky Linux Package Architecture
        if: matrix.format == 'rpm-rocky9'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TARBALL: ${{ steps.tarball_check.outputs.target_tarball }}
        run: |
          cd data_dev/driver
          
          docker run --rm --privileged \
             -v "$(pwd)":/workspace \
             -v /lib/modules:/lib/modules \
             -v /usr/src:/usr/src \
             -w /workspace rockylinux:9 bash -c "
             dnf install -y epel-release && \
             dnf install -y dkms git make rpm-build kernel-devel-\$(uname -r) && \
             dkms mkrpm --archive='$TARBALL' || true && \
             if [ -d 'dkms_binary' ]; then \
                cp dkms_binary/*.rpm ./datadev${SUFFIX}-dkms-${VERSION}-rocky9.noarch.rpm; \
             else \
                rpmbuild -ta '$TARBALL' || true && \
                cp /root/rpmbuild/RPMS/noarch/*.rpm ./ 2>/dev/null || true && \
                ls *.rpm | while read f; do mv \"\$f\" \"\${f%.rpm}-rocky9.rpm\"; done; \
             fi
          "
          
          echo "=== Completed RedHat Packages ==="
          ls -la *.rpm 2>/dev/null || (echo "Compilation Error: No packages found." && exit 1)

      # ----------------------------------------------------------------------
      # Track C: Save Artifacts for Local Verification
      # ----------------------------------------------------------------------
      - name: Upload Output Archives
        uses: actions/upload-artifact@v4
        with:
          name: compiled-packages-${{ matrix.driver_type }}-${{ matrix.format }}
          path: |
            data_dev/driver/*.deb
            data_dev/driver/*.rpm
          if-no-files-found: error
          retention-days: 2
