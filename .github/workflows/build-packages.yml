# ----------------------------------------------------------------------------
# Title      : Native GitHub Actions Container Package Generation (.deb & .rpm)
# ----------------------------------------------------------------------------
name: Build Distribution Packages
on:
  workflow_dispatch:

jobs:
  # ==========================================================================
  # Parallel Package Compilation using Native GitHub Containers
  # ==========================================================================
  compile_dist_packages:
    name: "Compile Package (${{ matrix.driver_type }} - ${{ matrix.target_env }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
        target_env: [ubuntu-22.04, ubuntu-24.04, rockylinux-9]
        include:
          - target_env: ubuntu-22.04
            container_image: "ubuntu:22.04"
            pkg_format: "deb"
          - target_env: ubuntu-24.04
            container_image: "ubuntu:24.04"
            pkg_format: "deb"
          - target_env: rockylinux-9
            container_image: "rockylinux:9"
            pkg_format: "rpm"
            
    # Native GitHub Action container initialization hook
    container:
      image: ${{ matrix.container_image }}
      
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ----------------------------------------------------------------------
      # Environment Setup Steps (Executed natively inside target container)
      # ----------------------------------------------------------------------
      - name: Install Native Ubuntu Packaging Engines
        if: matrix.pkg_format == 'deb'
        run: |
          apt-get update
          apt-get install -y debhelper dpkg-dev dkms build-essential make git

      - name: Install Native Rocky Linux Packaging Engines
        if: matrix.pkg_format == 'rpm'
        run: |
          dnf install -y epel-release
          dnf install -y dkms git make rpm-build rpm-devtools

      - name: Parse Metadata and Versioning
        id: meta
        run: |
          TAG_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0-test")
          CLEAN_VERSION=$(echo "${TAG_VERSION}" | sed 's/^v//')
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            echo "suffix=-gpu" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - name: Regenerate Source Tree for Packaging
        run: |
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            make -C data_dev/driver dkms_gpu || make -C data_dev/driver dkms TYPE=gpu || make -C data_dev/driver dkms
          else
            make -C data_dev/driver dkms
          fi

      - name: Normalize Tarball Architecture
        id: tarball_check
        run: |
          cd data_dev/driver
          ACTUAL_TARBALL=$(find . -maxdepth 1 -name "*.tar.gz" | head -n 1 | sed 's|^\./||')
          if [ -z "$ACTUAL_TARBALL" ]; then
            echo "ERROR: Target driver tarball failed to generate." && exit 1
          fi
          EXPECTED_TARBALL="datadev${{ steps.meta.outputs.suffix }}-dkms-${{ steps.meta.outputs.tag }}.tar.gz"
          if [ "$ACTUAL_TARBALL" != "$EXPECTED_TARBALL" ]; then
            mv "$ACTUAL_TARBALL" "$EXPECTED_TARBALL"
          fi
          echo "target_tarball=$EXPECTED_TARBALL" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------------
      # Build Track A: Build Debian Package Natively
      # ----------------------------------------------------------------------
      - name: Build Debian Package Architecture
        if: matrix.pkg_format == 'deb'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TARBALL: ${{ steps.tarball_check.outputs.target_tarball }}
        run: |
          cd data_dev/driver
          
          # Setup standard debian skeleton files
          mkdir -p debian/source
          echo '3.0 (native)' > debian/source/format
          
          cat <<EOF > debian/control
          Source: datadev${SUFFIX}
          Section: kernel
          Priority: optional
          Maintainer: CI System <ci@example.com>
          Build-Depends: debhelper-compat (= 13)
          Standards-Version: 4.6.2

          Package: datadev${SUFFIX}-dkms
          Architecture: all
          Depends: dkms, \${misc:Depends}
          Description: AES Stream Drivers packaged for DKMS architecture
          EOF

          cat <<EOF > debian/rules
          #!/usr/bin/make -f
          %:
          	dh \$@
          
          override_dh_auto_build:
          	true

          override_dh_auto_install:
          	mkdir -p debian/datadev${SUFFIX}-dkms/usr/src/datadev${SUFFIX}-${VERSION}
          	tar -xf ${TARBALL} --strip-components=1 -C debian/datadev${SUFFIX}-dkms/usr/src/datadev${SUFFIX}-${VERSION}/ || cp -r * debian/datadev${SUFFIX}-dkms/usr/src/datadev${SUFFIX}-${VERSION}/ || true
          EOF
          chmod +x debian/rules
          echo '13' > debian/compat
          
          cat <<EOF > debian/changelog
          datadev${SUFFIX}-dkms (${VERSION}) unstable; urgency=low
            * Automated production compilation run.
           -- CI System <ci@example.com>  $(date -R)
          EOF

          # Compile natively without escaping restrictions
          dpkg-buildpackage -us -uc -b
          mv ../*.deb ./datadev${SUFFIX}-dkms_${VERSION}_${{ matrix.target_env }}_all.deb

      # ----------------------------------------------------------------------
      # Build Track B: Build RedHat RPM Natively
      # ----------------------------------------------------------------------
      - name: Build RPM Package Architecture
        if: matrix.pkg_format == 'rpm'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TARBALL: ${{ steps.tarball_check.outputs.target_tarball }}
        run: |
          cd data_dev/driver
          
          rpmdev-setuptree
          
          cat <<EOF > /root/rpmbuild/SPECS/datadev.spec
          Name:           datadev${SUFFIX}-dkms
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        AES Stream Drivers package for DKMS
          License:        GPL
          URL:            https://github.com/slaclab/ruckus
          BuildArch:      noarch
          Requires:       dkms
          
          %description
          AES Stream Drivers package for DKMS configuration.

          %prep
          mkdir -p %{buildroot}/usr/src/datadev${SUFFIX}-${VERSION}
          tar -xf $(pwd)/${TARBALL} --strip-components=1 -C %{buildroot}/usr/src/datadev${SUFFIX}-${VERSION}/ || cp -r $(pwd)/* %{buildroot}/usr/src/datadev${SUFFIX}-${VERSION}/ || true

          %build
          true

          %install
          true

          %files
          /usr/src/datadev${SUFFIX}-${VERSION}
          EOF
          
          rpmbuild -bb /root/rpmbuild/SPECS/datadev.spec
          cp /root/rpmbuild/RPMS/noarch/*.rpm ./datadev${SUFFIX}-dkms-${VERSION}-${{ matrix.target_env }}.noarch.rpm

      # ----------------------------------------------------------------------
      # Track C: Save Artifacts for Local Verification
      # ----------------------------------------------------------------------
      - name: Upload Output Archives
        uses: actions/upload-artifact@v4
        with:
          name: compiled-packages-${{ matrix.driver_type }}-${{ matrix.target_env }}
          path: |
            data_dev/driver/*.deb
            data_dev/driver/*.rpm
          if-no-files-found: error
          retention-days: 2
