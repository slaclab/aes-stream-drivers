# ----------------------------------------------------------------------------
# Title      : Isolated Package Generation Test
# ----------------------------------------------------------------------------
# Dedicated test workflow to build DKMS, DEB, and RPM assets.
# Bypasses testing and release generation phases.
# Can be triggered manually via the GitHub Actions UI.
# ----------------------------------------------------------------------------

name: Test Packaging Logic
on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  # ==========================================================================
  # Isolated Package Generation (DKMS, DEB Loop, RPM)
  # ==========================================================================
  generate_packages:
    name: "Build Package (${{ matrix.driver_type }} - ${{ matrix.format }})"
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
        format: [dkms, deb-loop, rpm-rocky9]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Host Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dkms rpm
          python3 -m pip install --upgrade pip
          pip3 install -r pip_requirements.txt || true

      - name: Parse Mock Packaging Metadata
        id: meta
        run: |
          # Fallback metadata logic since we aren't relying on a formal git tag right now
          TAG_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0-test")
          CLEAN_VERSION=$(echo "${TAG_VERSION}" | sed 's/^v//')
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            echo "suffix=-gpu" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - name: Build Source DKMS Tarball
        run: |
          echo "=== Content BEFORE running make ==="
          ls -la data_dev/driver/
          
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            make -C data_dev/driver dkms_gpu || make -C data_dev/driver dkms TYPE=gpu || make -C data_dev/driver dkms
          else
            make -C data_dev/driver dkms
          fi
          
          echo "=== Content AFTER running make ==="
          ls -la data_dev/driver/

      - name: Dynamic Tarball Standardization
        id: tarball_check
        run: |
          cd data_dev/driver
          # Dynamically locate whatever .tar.gz was actually produced by the Makefile
          ACTUAL_TARBALL=$(find . -maxdepth 1 -name "*.tar.gz" | head -n 1 | sed 's|^\./||')
          
          if [ -z "$ACTUAL_TARBALL" ]; then
            echo "ERROR: No tarball was generated by the Makefile!"
            echo "Checking repository root just in case:"
            ls -la ../../ *.tar.gz 2>/dev/null || echo "None found at root either."
            exit 1
          fi
          
          # Standardize the name to what the workflow loops expect
          EXPECTED_TARBALL="datadev${{ steps.meta.outputs.suffix }}-dkms-${{ steps.meta.outputs.tag }}.tar.gz"
          
          if [ "$ACTUAL_TARBALL" != "$EXPECTED_TARBALL" ]; then
            echo "Notice: Makefile produced '$ACTUAL_TARBALL'. Renaming to match workflow expectations: '$EXPECTED_TARBALL'"
            mv "$ACTUAL_TARBALL" "$EXPECTED_TARBALL"
          fi
          
          echo "target_tarball=$EXPECTED_TARBALL" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------------
      # Track A: Core Source DKMS Tarball Output Verification
      # ----------------------------------------------------------------------
      - name: Verify DKMS Source Tarball
        if: matrix.format == 'dkms'
        run: |
          echo "Verifying standardized tarball existence..."
          ls -l data_dev/driver/${{ steps.tarball_check.outputs.target_tarball }}

      # ----------------------------------------------------------------------
      # Track B: Ubuntu Debian Loop Generation (.deb)
      # ----------------------------------------------------------------------
      - name: Run Sequential Ubuntu Version Packaging Loop
        if: matrix.format == 'deb-loop'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TARBALL: ${{ steps.tarball_check.outputs.target_tarball }}
        run: |
          UBUNTU_VERSIONS=("22.04" "24.04")
          cd data_dev/driver
          
          for UVP in "${UBUNTU_VERSIONS[@]}"; do
             echo "========================================================="
             echo "Processing Native Package build for target: Ubuntu $UVP"
             echo "========================================================="
             
             docker run --rm -v "$(pwd)":/workspace -w /workspace ubuntu:"$UVP" bash -c "
                apt-get update && \
                apt-get install -y debhelper dkms fakeroot make git && \
                dkms mkdeb --source-only --archive='$TARBALL' || true && \
                if [ -d 'dkms_binary' ]; then \
                   cp dkms_binary/*.deb ./datadev${SUFFIX}-dkms_${VERSION}_ubuntu-\${UVP}_all.deb; \
                else \
                   fakeroot dh_binary || true && \
                   ls *.deb | while read f; do mv \"\$f\" \"\${f%.deb}_ubuntu-\${UVP}.deb\"; done; \
                fi
             "
          done
          
          echo "Final generated Debian packages:"
          ls -la *.deb 2>/dev/null || echo "No .deb files found"

      # ----------------------------------------------------------------------
      # Track C: Rocky Linux RPM Generation (.rpm)
      # ----------------------------------------------------------------------
      - name: Compile Rocky Linux Package Architecture
        if: matrix.format == 'rpm-rocky9'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TARBALL: ${{ steps.tarball_check.outputs.target_tarball }}
        run: |
          cd data_dev/driver
          
          docker run --rm -v "$(pwd)":/workspace -w /workspace rockylinux:9 bash -c "
             dnf install -y epel-release && \
             dnf install -y dkms git make rpm-build && \
             dkms mkrpm --source-only --archive='$TARBALL' || true && \
             if [ -d 'dkms_binary' ]; then \
                cp dkms_binary/*.rpm ./datadev${SUFFIX}-dkms-${VERSION}-rocky9.noarch.rpm; \
             else \
                rpmbuild -ta '$TARBALL' || true && \
                cp /root/rpmbuild/RPMS/noarch/*.rpm ./ 2>/dev/null || true && \
                ls *.rpm | while read f; do mv \"\$f\" \"\${f%.rpm}-rocky9.rpm\"; done; \
             fi
          "
          
          echo "Final generated RPM packages:"
          ls -la *.rpm 2>/dev/null || echo "No .rpm files found"

      # ----------------------------------------------------------------------
      # Track D: Save Artifacts for Local Review
      # ----------------------------------------------------------------------
      - name: Upload Packages as CI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-packages-${{ matrix.driver_type }}--${{ matrix.format }}
          path: |
            data_dev/driver/*.deb
            data_dev/driver/*.rpm
            data_dev/driver/*.tar.gz
          if-no-files-found: ignore
          retention-days: 1
