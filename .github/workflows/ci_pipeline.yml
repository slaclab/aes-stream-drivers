# ----------------------------------------------------------------------------
# Title      : AES Stream Drivers CI Pipeline
# ----------------------------------------------------------------------------
# Complete CI/CD pipeline with sequential phases:
#  Phase 1: Documentation & Linting
#  Phase 2: CPU Testing (5 distros in parallel) → waits for Phase 1
#  Phase 3: GPU Testing (5 distros in parallel) → waits for Phase 2
#  Phase 4: Release Generation → waits for Phase 3
#  Phase 5: Parallel Package Generation (DKMS, DEB Loop, RPM) → waits for Phase 4
#  Phase 6: Real Distribution Packages (.deb/.rpm) → waits for Phase 5
#
# All phases visible in a single GitHub Actions run page.
# ----------------------------------------------------------------------------

name: CI Pipeline
on: [push]

jobs:
  # ==========================================================================
  # Phase 1: Documentation & Linting
  # ==========================================================================
  test_and_document:
    name: "Phase 1: Documentation & Linting"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip doxygen
          python -m pip install --upgrade pip
          pip install -r pip_requirements.txt
          pip install -r docs/requirements.txt

      - name: Documentation build smoke test
        run: |
          cd docs
          doxygen Doxyfile
          make html
          test -f _build/html/index.html

      - name: Check for trailing whitespace and tabs
        run: |
          if grep -rnI '[[:blank:]]$' --include=\*.{c,cpp,h,sh,py} .; then
            echo "Error: Trailing whitespace found in the repository!"
            exit 1
          fi
          if grep -rnI $'\t' --include=\*.{c,cpp,h,sh,py} .; then
            echo "Error: Tab characters found in the repository! Please use spaces for indentation."
            exit 1
          fi

      - name: C/C++ Linter
        run: |
          find . -name '*.h' -o -name '*.cpp' -o -name '*.c' | xargs cpplint

      - name: Assert gpu_async.c unchanged from main
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            echo "WARN: cannot resolve merge base; skipping diff gate"
            exit 0
          fi
          git diff --exit-code "$BASE" -- \
            common/driver/gpu_async.c \
            data_dev/driver/src/gpu_async.c

  # ==========================================================================
  # Phase 2: CPU Testing (5 distros in parallel)
  # ==========================================================================
  cpu_test:
    name: "Phase 2: CPU Test (${{ matrix.container }})"
    needs: [test_and_document]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: "ubuntu:24.04"
            load_test: true
          - container: "ubuntu:22.04"
            load_test: true
          - container: "rockylinux:9"
            load_test: true
          - container: "debian:experimental"
            load_test: true
          - container: "fedora:rawhide"
            load_test: true
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
      options: "--privileged -v /lib/modules:/lib/modules -v /usr/src:/usr/src"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bash scripts/ci/install-deps.sh

      - name: Display environment info
        run: |
          echo "Container: ${{ matrix.container }}"
          echo "Host kernel: $(uname -r)"
          echo "Build kernel: ${CI_KVER}"
          echo "Host match: ${CI_HOST_MATCH}"
          echo "## ${{ matrix.container }} — kernel ${CI_KVER}" >> $GITHUB_STEP_SUMMARY

      - name: Build (CPU)
        run: bash scripts/ci/build-cpu.sh

      - name: Load modules
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/load-modules-cpu.sh

      - name: Run tests
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/test-cpu.sh

      - name: Unload modules
        if: always() && matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/unload-modules-cpu.sh

      - name: Test DKMS (smoke)
        run: bash scripts/ci/test-dkms-cpu-smoke.sh

      - name: Check dmesg
        if: always()
        run: bash scripts/ci/check-dmesg.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diag
          dmesg > diag/dmesg.txt 2>&1 || true
          cp /tmp/phase3_tests.log   diag/ 2>/dev/null || true
          cp /tmp/test_params.log    diag/ 2>/dev/null || true
          cp dma_loop_output.txt     diag/ 2>/dev/null || true
          cp dma_rate_output.txt     diag/ 2>/dev/null || true
          cp emulator/driver/datadev_emulator.ko diag/ 2>/dev/null || true
          cp data_dev/driver/datadev.ko          diag/ 2>/dev/null || true
          ls -la diag/ || true

      - name: Sanitize container name for artifact
        if: failure()
        run: |
          SANITIZED=$(echo "${{ matrix.container }}" | sed 's/:/-/g; s/\//-/g')
          echo "ARTIFACT_NAME=cpu-ci-diag-${{ github.job }}-${SANITIZED}" >> $GITHUB_ENV

      - name: Upload diagnostics on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: diag/
          retention-days: 3
          if-no-files-found: ignore

      - name: Dump full dmesg on failure
        if: failure()
        run: dmesg || echo "dmesg not available (expected in container)"

  # ==========================================================================
  # Phase 3: GPU Testing (5 distros in parallel)
  # ==========================================================================
  gpu_test:
    name: "Phase 3: GPU Test (${{ matrix.container }})"
    needs: [cpu_test]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: "ubuntu:24.04"
            load_test: true
          - container: "ubuntu:22.04"
            load_test: true
          - container: "rockylinux:9"
            load_test: true
          - container: "debian:experimental"
            load_test: true
          - container: "fedora:rawhide"
            load_test: true
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
      options: "--privileged -v /lib/modules:/lib/modules -v /usr/src:/usr/src"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bash scripts/ci/install-deps.sh

      - name: Display environment info
        run: |
          echo "Container: ${{ matrix.container }}"
          echo "Host kernel: $(uname -r)"
          echo "Build kernel: ${CI_KVER}"
          echo "Host match: ${CI_HOST_MATCH}"
          echo "## ${{ matrix.container }} — kernel ${CI_KVER}" >> $GITHUB_STEP_SUMMARY

      - name: Build (GPU)
        run: bash scripts/ci/build-gpu.sh

      - name: Load modules
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/load-modules-gpu.sh

      - name: Run tests
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/test-gpu.sh

      - name: Unload modules
        if: always() && matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/unload-modules-gpu.sh

      - name: Test DKMS (smoke)
        run: bash scripts/ci/test-dkms-gpu-smoke.sh

      - name: Check dmesg
        if: always()
        run: bash scripts/ci/check-dmesg.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diag
          dmesg > diag/dmesg.txt 2>&1 || true
          cp /tmp/phase4_tests.log       diag/ 2>/dev/null || true
          cp dma_loop_output_gpu.txt     diag/ 2>/dev/null || true
          cp emulator/driver/datadev_emulator.ko diag/ 2>/dev/null || true
          cp emulator/gpu_stub/nvidia_p2p_stub.ko diag/ 2>/dev/null || true
          cp data_dev/driver/datadev.ko          diag/ 2>/dev/null || true
          ls -la diag/ || true

      - name: Sanitize container name for artifact
        if: failure()
        run: |
          SANITIZED=$(echo "${{ matrix.container }}" | sed 's/:/-/g; s/\//-/g')
          echo "ARTIFACT_NAME=gpu-ci-diag-${{ github.job }}-${SANITIZED}" >> $GITHUB_ENV

      - name: Upload diagnostics on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: diag/
          retention-days: 3
          if-no-files-found: ignore

      - name: Dump full dmesg on failure
        if: failure()
        run: dmesg || echo "dmesg not available (expected in container)"

  # ==========================================================================
  # Phase 4: Release Generation
  # ==========================================================================
  gen_release:
    name: "Phase 4: Generate Release"
    needs: [gpu_test]
    uses: slaclab/ruckus/.github/workflows/gen_release.yml@main
    with:
      version: '1.0.0'
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ==========================================================================
  # Phase 5: Parallel Package Generation (DKMS, DEB Loop, RPM)
  # ==========================================================================
  generate_packages:
    name: "Phase 5: Build Package (${{ matrix.driver_type }} - ${{ matrix.format }})"
    needs: [gen_release]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
        format: [dkms, deb-loop, rpm-rocky9]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Host Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dkms rpm
          python3 -m pip install --upgrade pip
          pip3 install -r pip_requirements.txt

      - name: Parse Packaging Metadata
        id: meta
        run: |
          TAG_VERSION=$(git describe --tags)
          CLEAN_VERSION=$(echo "${TAG_VERSION}" | sed 's/^v//')
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            echo "suffix=-gpu" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - name: Build Source DKMS Tarball
        run: |
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            make -C data_dev/driver dkms_gpu || make -C data_dev/driver dkms TYPE=gpu || make -C data_dev/driver dkms
          else
            make -C data_dev/driver dkms
          fi

      # ----------------------------------------------------------------------
      # Track A: Core Source DKMS Tarball Upload
      # ----------------------------------------------------------------------
      - name: Upload Baseline DKMS Source Tarball
        if: matrix.format == 'dkms'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          GIT_REPO: ${{ github.repository }}
        run: |
          python3 scripts/uploadTag.py --tag=$TAG --repo=$GIT_REPO --file=data_dev/driver/datadev${SUFFIX}-dkms-${TAG}.tar.gz

      # ----------------------------------------------------------------------
      # Track B: Ubuntu Debian Loop Generation (.deb)
      # ----------------------------------------------------------------------
      - name: Run Sequential Ubuntu Version Packaging Loop
        if: matrix.format == 'deb-loop'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TAG: ${{ steps.meta.outputs.tag }}
          GIT_REPO: ${{ github.repository }}
        run: |
          # Add newer Ubuntu variants to this list as they release (e.g., "26.04")
          UBUNTU_VERSIONS=("22.04" "24.04")
          
          cd data_dev/driver
          TARBALL="datadev${SUFFIX}-dkms-${TAG}.tar.gz"
          
          for UVP in "${UBUNTU_VERSIONS[@]}"; do
             echo "========================================================="
             echo "Processing Native Package build for target: Ubuntu $UVP"
             echo "========================================================="
             
             # Spin up an isolated background target environment via Docker container engine
             docker run --rm -v "$(pwd)":/workspace -w /workspace ubuntu:"$UVP" bash -c "
                apt-get update && \
                apt-get install -y debhelper dkms fakeroot make git && \
                dkms mkdeb --source-only --archive='$TARBALL' || true && \
                if [ -d 'dkms_binary' ]; then \
                   cp dkms_binary/*.deb ./datadev${SUFFIX}-dkms_${VERSION}_ubuntu-\${UVP}_all.deb; \
                else \
                   fakeroot dh_binary || true && \
                   ls *.deb | while read f; do mv \"\$f\" \"\${f%.deb}_ubuntu-\${UVP}.deb\"; done; \
                fi
             "
             
             # Locate and upload newly built binary for this specific distribution step
             for deb in *_ubuntu-"${UVP}"*.deb; do
               if [ -f "$deb" ]; then
                 echo "Uploading built asset: $deb"
                 python3 ../../scripts/uploadTag.py --tag=$TAG --repo=$GIT_REPO --file="$deb"
               fi
             done
          done

      # ----------------------------------------------------------------------
      # Track C: Rocky Linux RPM Generation (.rpm)
      # ----------------------------------------------------------------------
      - name: Compile Rocky Linux Package Architecture
        if: matrix.format == 'rpm-rocky9'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TAG: ${{ steps.meta.outputs.tag }}
          GIT_REPO: ${{ github.repository }}
        run: |
          cd data_dev/driver
          TARBALL="datadev${SUFFIX}-dkms-${TAG}.tar.gz"
          
          docker run --rm -v "$(pwd)":/workspace -w /workspace rockylinux:9 bash -c "
             dnf install -y epel-release && \
             dnf install -y dkms git make rpm-build && \
             dkms mkrpm --source-only --archive='$TARBALL' || true && \
             if [ -d 'dkms_binary' ]; then \
                cp dkms_binary/*.rpm ./datadev${SUFFIX}-dkms-${VERSION}-rocky9.noarch.rpm; \
             else \
                rpmbuild -ta '$TARBALL' || true && \
                cp /root/rpmbuild/RPMS/noarch/*.rpm ./ 2>/dev/null || true && \
                ls *.rpm | while read f; do mv \"\$f\" \"\${f%.rpm}-rocky9.rpm\"; done; \
             fi
          "
          
          for rpm in *-rocky9*.rpm; do
            if [ -f "$rpm" ]; then
              python3 ../../scripts/uploadTag.py --tag=$TAG --repo=$GIT_REPO --file="$rpm"
            fi
          done

  # ==========================================================================
  # Phase 6: Real Distribution Packages (.deb & .rpm)
  # ==========================================================================
  # Builds real installable DKMS packages per target:
  #   * ubuntu-22.04  -> .deb
  #   * ubuntu-24.04  -> .deb
  #   * rockylinux-9  -> .rpm
  # for both the CPU (datadev) and GPU (datadev-gpu) driver variants, then
  # uploads each built package to the GitHub release.
  #
  # The build runs inside the target distro via `docker run`, mounting the
  # already-checked-out repo (which keeps its .git, so the Makefile's
  # `git describe` versioning works correctly). Each package ships the DKMS
  # source tree under /usr/src and registers it with dkms on install.
  # ==========================================================================
  dist_packages:
    name: "Phase 6: Dist Package (${{ matrix.driver_type }} - ${{ matrix.target_env }})"
    needs: [generate_packages]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
        target_env: [ubuntu-22.04, ubuntu-24.04, rockylinux-9]
        include:
          - target_env: ubuntu-22.04
            container_image: "ubuntu:22.04"
            pkg_format: "deb"
          - target_env: ubuntu-24.04
            container_image: "ubuntu:24.04"
            pkg_format: "deb"
          - target_env: rockylinux-9
            container_image: "rockylinux:9"
            pkg_format: "rpm"
    steps:
      # Checkout on the HOST runner so the full .git history is present and
      # gets mounted into the build container (needed by the Makefile's
      # `git describe` versioning).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Host Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Host Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r pip_requirements.txt

      - name: Parse release tag
        id: meta
        run: |
          TAG_VERSION=$(git describe --tags)
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------------
      # Build .deb (Ubuntu targets)
      # ----------------------------------------------------------------------
      - name: Build Debian package
        if: matrix.pkg_format == 'deb'
        env:
          IMAGE: ${{ matrix.container_image }}
          DRIVER_TYPE: ${{ matrix.driver_type }}
          TARGET_ENV: ${{ matrix.target_env }}
        run: |
          docker run --rm \
            -e DRIVER_TYPE -e TARGET_ENV \
            -v "${PWD}":/ws -w /ws "${IMAGE}" bash -euo pipefail -c '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq make git tar dpkg-dev >/dev/null

              # Build the DKMS source tarballs (cpu + gpu) from the mounted tree.
              make -C data_dev/driver dkms
              cd data_dev/driver

              # Select the tarball matching this leg. The cpu glob
              # (datadev-dkms-*) does not match the gpu name (datadev-gpu-dkms-*).
              if [ "${DRIVER_TYPE}" = "gpu" ]; then
                TARBALL=$(ls datadev-gpu-dkms-*.tar.gz 2>/dev/null | head -n1)
              else
                TARBALL=$(ls datadev-dkms-*.tar.gz 2>/dev/null | head -n1)
              fi
              if [ -z "${TARBALL}" ]; then
                echo "ERROR: DKMS source tarball not produced for ${DRIVER_TYPE}" >&2
                exit 1
              fi
              echo "Using tarball: ${TARBALL}"

              # Unpack the DKMS source tree (dkms_source_tree holds dkms.conf + src).
              rm -rf stage && mkdir -p stage
              tar -xzf "${TARBALL}" -C stage
              SRC=stage/dkms_source_tree

              PKG=$(sed -n "s/^PACKAGE_NAME=//p" "${SRC}/dkms.conf" | tr -d "\"")
              DVER=$(sed -n "s/^PACKAGE_VERSION=//p" "${SRC}/dkms.conf" | tr -d "\"")
              # Package-metadata version must be clean (no leading v, no dashes).
              MVER=$(echo "${DVER}" | sed "s/^v//; s/-/./g")
              echo "PKG=${PKG} DKMS_VERSION=${DVER} META_VERSION=${MVER}"

              # Assemble the .deb staging tree.
              ROOT=debpkg
              rm -rf "${ROOT}"
              install -d "${ROOT}/usr/src/${PKG}-${DVER}"
              cp -a "${SRC}/." "${ROOT}/usr/src/${PKG}-${DVER}/"
              install -d "${ROOT}/DEBIAN"

              cat > "${ROOT}/DEBIAN/control" <<CTL
          Package: ${PKG}
          Version: ${MVER}
          Section: kernel
          Priority: optional
          Architecture: all
          Maintainer: SLAC CI <ci@slac.stanford.edu>
          Depends: dkms
          Description: AES Stream Drivers (datadev) DKMS module
           DKMS source package for the ${PKG} kernel module, built for ${TARGET_ENV}.
          CTL

              cat > "${ROOT}/DEBIAN/postinst" <<POST
          #!/bin/sh
          set -e
          dkms add -m ${PKG} -v ${DVER} || true
          dkms build -m ${PKG} -v ${DVER}
          dkms install -m ${PKG} -v ${DVER} --force
          POST

              cat > "${ROOT}/DEBIAN/prerm" <<PRERM
          #!/bin/sh
          set -e
          dkms remove -m ${PKG} -v ${DVER} --all || true
          PRERM

              chmod 0755 "${ROOT}/DEBIAN/postinst" "${ROOT}/DEBIAN/prerm"

              OUT="${PKG}_${MVER}_${TARGET_ENV}_all.deb"
              dpkg-deb --build --root-owner-group "${ROOT}" "${OUT}"
              echo "=== Built ${OUT} ==="
              dpkg-deb -I "${OUT}"
              dpkg-deb -c "${OUT}"
            '

      # ----------------------------------------------------------------------
      # Build .rpm (Rocky Linux 9 target)
      # ----------------------------------------------------------------------
      - name: Build RPM package
        if: matrix.pkg_format == 'rpm'
        env:
          IMAGE: ${{ matrix.container_image }}
          DRIVER_TYPE: ${{ matrix.driver_type }}
          TARGET_ENV: ${{ matrix.target_env }}
        run: |
          docker run --rm \
            -e DRIVER_TYPE -e TARGET_ENV \
            -v "${PWD}":/ws -w /ws "${IMAGE}" bash -euo pipefail -c '
              dnf install -y -q make git tar rpm-build >/dev/null

              make -C data_dev/driver dkms
              cd data_dev/driver

              if [ "${DRIVER_TYPE}" = "gpu" ]; then
                TARBALL=$(ls datadev-gpu-dkms-*.tar.gz 2>/dev/null | head -n1)
              else
                TARBALL=$(ls datadev-dkms-*.tar.gz 2>/dev/null | head -n1)
              fi
              if [ -z "${TARBALL}" ]; then
                echo "ERROR: DKMS source tarball not produced for ${DRIVER_TYPE}" >&2
                exit 1
              fi
              echo "Using tarball: ${TARBALL}"

              rm -rf stage && mkdir -p stage
              tar -xzf "${TARBALL}" -C stage
              SRC="${PWD}/stage/dkms_source_tree"

              PKG=$(sed -n "s/^PACKAGE_NAME=//p" "${SRC}/dkms.conf" | tr -d "\"")
              DVER=$(sed -n "s/^PACKAGE_VERSION=//p" "${SRC}/dkms.conf" | tr -d "\"")
              MVER=$(echo "${DVER}" | sed "s/^v//; s/-/./g")
              echo "PKG=${PKG} DKMS_VERSION=${DVER} META_VERSION=${MVER}"

              mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,BUILDROOT}

              cat > ~/rpmbuild/SPECS/datadev.spec <<SPEC
          Name:           ${PKG}
          Version:        ${MVER}
          Release:        1%{?dist}
          Summary:        AES Stream Drivers (datadev) DKMS module
          License:        SLAC
          BuildArch:      noarch
          Requires:       dkms

          %description
          DKMS source package for the ${PKG} kernel module, built for ${TARGET_ENV}.

          %install
          mkdir -p %{buildroot}/usr/src/${PKG}-${DVER}
          cp -a ${SRC}/. %{buildroot}/usr/src/${PKG}-${DVER}/

          %files
          /usr/src/${PKG}-${DVER}

          %post
          dkms add -m ${PKG} -v ${DVER} || true
          dkms build -m ${PKG} -v ${DVER}
          dkms install -m ${PKG} -v ${DVER} --force

          %preun
          dkms remove -m ${PKG} -v ${DVER} --all || true
          SPEC

              rpmbuild -bb ~/rpmbuild/SPECS/datadev.spec
              OUT="${PKG}-${MVER}-${TARGET_ENV}.noarch.rpm"
              cp ~/rpmbuild/RPMS/noarch/*.rpm "./${OUT}"
              echo "=== Built ${OUT} ==="
              rpm -qpi "./${OUT}"
              rpm -qpl "./${OUT}"
            '

      # ----------------------------------------------------------------------
      # Upload the built package(s) to the GitHub release
      # ----------------------------------------------------------------------
      - name: Upload package to release
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          GIT_REPO: ${{ github.repository }}
          GH_REPO_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          shopt -s nullglob
          for pkg in data_dev/driver/*.deb data_dev/driver/*.rpm; do
            echo "Uploading built asset: $pkg"
            python3 scripts/uploadTag.py --tag="$TAG" --repo="$GIT_REPO" --file="$pkg"
          done
