# ----------------------------------------------------------------------------
# Title      : AES Stream Drivers CI Pipeline
# ----------------------------------------------------------------------------
# Complete CI/CD pipeline with sequential phases:
#  Phase 1: Documentation & Linting
#  Phase 2: CPU Testing (5 distros in parallel) → waits for Phase 1
#  Phase 3: GPU Testing (5 distros in parallel) → waits for Phase 2
#  Phase 4: Release Generation → waits for Phase 3
#  Phase 5: Parallel Package Generation (DKMS, DEB Loop, RPM) → waits for Phase 4
#
# All phases visible in a single GitHub Actions run page.
# ----------------------------------------------------------------------------

name: CI Pipeline
on: [push]

jobs:
  # ==========================================================================
  # Phase 1: Documentation & Linting
  # ==========================================================================
  test_and_document:
    name: "Phase 1: Documentation & Linting"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip doxygen
          python -m pip install --upgrade pip
          pip install -r pip_requirements.txt
          pip install -r docs/requirements.txt

      - name: Documentation build smoke test
        run: |
          cd docs
          doxygen Doxyfile
          make html
          test -f _build/html/index.html

      - name: Check for trailing whitespace and tabs
        run: |
          if grep -rnI '[[:blank:]]$' --include=\*.{c,cpp,h,sh,py} .; then
            echo "Error: Trailing whitespace found in the repository!"
            exit 1
          fi
          if grep -rnI $'\t' --include=\*.{c,cpp,h,sh,py} .; then
            echo "Error: Tab characters found in the repository! Please use spaces for indentation."
            exit 1
          fi

      - name: C/C++ Linter
        run: |
          find . -name '*.h' -o -name '*.cpp' -o -name '*.c' | xargs cpplint

      - name: Assert gpu_async.c unchanged from main
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo "")
          if [ -z "$BASE" ]; then
            echo "WARN: cannot resolve merge base; skipping diff gate"
            exit 0
          fi
          git diff --exit-code "$BASE" -- \
            common/driver/gpu_async.c \
            data_dev/driver/src/gpu_async.c

  # ==========================================================================
  # Phase 2: CPU Testing (5 distros in parallel)
  # ==========================================================================
  cpu_test:
    name: "Phase 2: CPU Test (${{ matrix.container }})"
    needs: [test_and_document]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: "ubuntu:24.04"
            load_test: true
          - container: "ubuntu:22.04"
            load_test: true
          - container: "rockylinux:9"
            load_test: true
          - container: "debian:experimental"
            load_test: true
          - container: "fedora:rawhide"
            load_test: true
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
      options: "--privileged -v /lib/modules:/lib/modules -v /usr/src:/usr/src"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bash scripts/ci/install-deps.sh

      - name: Display environment info
        run: |
          echo "Container: ${{ matrix.container }}"
          echo "Host kernel: $(uname -r)"
          echo "Build kernel: ${CI_KVER}"
          echo "Host match: ${CI_HOST_MATCH}"
          echo "## ${{ matrix.container }} — kernel ${CI_KVER}" >> $GITHUB_STEP_SUMMARY

      - name: Build (CPU)
        run: bash scripts/ci/build-cpu.sh

      - name: Load modules
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/load-modules-cpu.sh

      - name: Run tests
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/test-cpu.sh

      - name: Unload modules
        if: always() && matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/unload-modules-cpu.sh

      - name: Test DKMS (smoke)
        run: bash scripts/ci/test-dkms-cpu-smoke.sh

      - name: Check dmesg
        if: always()
        run: bash scripts/ci/check-dmesg.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diag
          dmesg > diag/dmesg.txt 2>&1 || true
          cp /tmp/phase3_tests.log   diag/ 2>/dev/null || true
          cp /tmp/test_params.log    diag/ 2>/dev/null || true
          cp dma_loop_output.txt     diag/ 2>/dev/null || true
          cp dma_rate_output.txt     diag/ 2>/dev/null || true
          cp emulator/driver/datadev_emulator.ko diag/ 2>/dev/null || true
          cp data_dev/driver/datadev.ko          diag/ 2>/dev/null || true
          ls -la diag/ || true

      - name: Sanitize container name for artifact
        if: failure()
        run: |
          SANITIZED=$(echo "${{ matrix.container }}" | sed 's/:/-/g; s/\//-/g')
          echo "ARTIFACT_NAME=cpu-ci-diag-${{ github.job }}-${SANITIZED}" >> $GITHUB_ENV

      - name: Upload diagnostics on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: diag/
          retention-days: 3
          if-no-files-found: ignore

      - name: Dump full dmesg on failure
        if: failure()
        run: dmesg || echo "dmesg not available (expected in container)"

  # ==========================================================================
  # Phase 3: GPU Testing (5 distros in parallel)
  # ==========================================================================
  gpu_test:
    name: "Phase 3: GPU Test (${{ matrix.container }})"
    needs: [cpu_test]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: "ubuntu:24.04"
            load_test: true
          - container: "ubuntu:22.04"
            load_test: true
          - container: "rockylinux:9"
            load_test: true
          - container: "debian:experimental"
            load_test: true
          - container: "fedora:rawhide"
            load_test: true
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
      options: "--privileged -v /lib/modules:/lib/modules -v /usr/src:/usr/src"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bash scripts/ci/install-deps.sh

      - name: Display environment info
        run: |
          echo "Container: ${{ matrix.container }}"
          echo "Host kernel: $(uname -r)"
          echo "Build kernel: ${CI_KVER}"
          echo "Host match: ${CI_HOST_MATCH}"
          echo "## ${{ matrix.container }} — kernel ${CI_KVER}" >> $GITHUB_STEP_SUMMARY

      - name: Build (GPU)
        run: bash scripts/ci/build-gpu.sh

      - name: Load modules
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/load-modules-gpu.sh

      - name: Run tests
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/test-gpu.sh

      - name: Unload modules
        if: always() && matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/unload-modules-gpu.sh

      - name: Test DKMS (smoke)
        run: bash scripts/ci/test-dkms-gpu-smoke.sh

      - name: Check dmesg
        if: always()
        run: bash scripts/ci/check-dmesg.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diag
          dmesg > diag/dmesg.txt 2>&1 || true
          cp /tmp/phase4_tests.log       diag/ 2>/dev/null || true
          cp dma_loop_output_gpu.txt     diag/ 2>/dev/null || true
          cp emulator/driver/datadev_emulator.ko diag/ 2>/dev/null || true
          cp emulator/gpu_stub/nvidia_p2p_stub.ko diag/ 2>/dev/null || true
          cp data_dev/driver/datadev.ko          diag/ 2>/dev/null || true
          ls -la diag/ || true

      - name: Sanitize container name for artifact
        if: failure()
        run: |
          SANITIZED=$(echo "${{ matrix.container }}" | sed 's/:/-/g; s/\//-/g')
          echo "ARTIFACT_NAME=gpu-ci-diag-${{ github.job }}-${SANITIZED}" >> $GITHUB_ENV

      - name: Upload diagnostics on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: diag/
          retention-days: 3
          if-no-files-found: ignore

      - name: Dump full dmesg on failure
        if: failure()
        run: dmesg || echo "dmesg not available (expected in container)"

  # ==========================================================================
  # Phase 4: Release Generation
  # ==========================================================================
  gen_release:
    name: "Phase 4: Generate Release"
    needs: [gpu_test]
    uses: slaclab/ruckus/.github/workflows/gen_release.yml@main
    with:
      version: '1.0.0'
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ==========================================================================
  # Phase 5: Parallel Package Generation (DKMS, DEB Loop, RPM)
  # ==========================================================================
  generate_packages:
    name: "Phase 5: Build Package (${{ matrix.driver_type }} - ${{ matrix.format }})"
    needs: [gen_release]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
        format: [dkms, deb-loop, rpm-rocky9]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Host Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dkms rpm
          python3 -m pip install --upgrade pip
          pip3 install -r pip_requirements.txt

      - name: Parse Packaging Metadata
        id: meta
        run: |
          TAG_VERSION=$(git describe --tags)
          CLEAN_VERSION=$(echo "${TAG_VERSION}" | sed 's/^v//')
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            echo "suffix=-gpu" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - name: Build Source DKMS Tarball
        run: |
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            make -C data_dev/driver dkms_gpu || make -C data_dev/driver dkms TYPE=gpu || make -C data_dev/driver dkms
          else
            make -C data_dev/driver dkms
          fi

      # ----------------------------------------------------------------------
      # Track A: Core Source DKMS Tarball Upload
      # ----------------------------------------------------------------------
      - name: Upload Baseline DKMS Source Tarball
        if: matrix.format == 'dkms'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          GIT_REPO: ${{ github.repository }}
        run: |
          python3 scripts/uploadTag.py --tag=$TAG --repo=$GIT_REPO --file=data_dev/driver/datadev${SUFFIX}-dkms-${TAG}.tar.gz

      # ----------------------------------------------------------------------
      # Track B: Ubuntu Debian Loop Generation (.deb)
      # ----------------------------------------------------------------------
      - name: Run Sequential Ubuntu Version Packaging Loop
        if: matrix.format == 'deb-loop'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TAG: ${{ steps.meta.outputs.tag }}
          GIT_REPO: ${{ github.repository }}
        run: |
          # Add newer Ubuntu variants to this list as they release (e.g., "26.04")
          UBUNTU_VERSIONS=("22.04" "24.04")
          
          cd data_dev/driver
          TARBALL="datadev${SUFFIX}-dkms-${TAG}.tar.gz"
          
          for UVP in "${UBUNTU_VERSIONS[@]}"; do
             echo "========================================================="
             echo "Processing Native Package build for target: Ubuntu $UVP"
             echo "========================================================="
             
             # Spin up an isolated background target environment via Docker container engine
             docker run --rm -v "$(pwd)":/workspace -w /workspace ubuntu:"$UVP" bash -c "
                apt-get update && \
                apt-get install -y debhelper dkms fakeroot make git && \
                dkms mkdeb --source-only --archive='$TARBALL' || true && \
                if [ -d 'dkms_binary' ]; then \
                   cp dkms_binary/*.deb ./datadev${SUFFIX}-dkms_${VERSION}_ubuntu-\${UVP}_all.deb; \
                else \
                   fakeroot dh_binary || true && \
                   ls *.deb | while read f; do mv \"\$f\" \"\${f%.deb}_ubuntu-\${UVP}.deb\"; done; \
                fi
             "
             
             # Locate and upload newly built binary for this specific distribution step
             for deb in *_ubuntu-"${UVP}"*.deb; do
               if [ -f "$deb" ]; then
                 echo "Uploading built asset: $deb"
                 python3 ../../scripts/uploadTag.py --tag=$TAG --repo=$GIT_REPO --file="$deb"
               fi
             done
          done

      # ----------------------------------------------------------------------
      # Track C: Rocky Linux RPM Generation (.rpm)
      # ----------------------------------------------------------------------
      - name: Compile Rocky Linux Package Architecture
        if: matrix.format == 'rpm-rocky9'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          TAG: ${{ steps.meta.outputs.tag }}
          GIT_REPO: ${{ github.repository }}
        run: |
          cd data_dev/driver
          TARBALL="datadev${SUFFIX}-dkms-${TAG}.tar.gz"
          
          docker run --rm -v "$(pwd)":/workspace -w /workspace rockylinux:9 bash -c "
             dnf install -y epel-release && \
             dnf install -y dkms git make rpm-build && \
             dkms mkrpm --source-only --archive='$TARBALL' || true && \
             if [ -d 'dkms_binary' ]; then \
                cp dkms_binary/*.rpm ./datadev${SUFFIX}-dkms-${VERSION}-rocky9.noarch.rpm; \
             else \
                rpmbuild -ta '$TARBALL' || true && \
                cp /root/rpmbuild/RPMS/noarch/*.rpm ./ 2>/dev/null || true && \
                ls *.rpm | while read f; do mv \"\$f\" \"\${f%.rpm}-rocky9.rpm\"; done; \
             fi
          "
          
          for rpm in *-rocky9*.rpm; do
            if [ -f "$rpm" ]; then
              python3 ../../scripts/uploadTag.py --tag=$TAG --repo=$GIT_REPO --file="$rpm"
            fi
          done
