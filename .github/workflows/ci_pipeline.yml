# ----------------------------------------------------------------------------
# Title      : AES Stream Drivers CI Pipeline
# ----------------------------------------------------------------------------
# Complete CI/CD pipeline with sequential phases:
#  Phase 1: Documentation & Linting
#  Phase 2: CPU Testing (5 distros in parallel) → waits for Phase 1
#  Phase 3: GPU Testing (5 distros in parallel) → waits for Phase 2
#  Phase 4: Release Generation → waits for Phase 3
#  Phase 5: DKMS Source Tarball Builds + Uploads (cpu, gpu) → waits for Phase 4
#  Phase 6: Distribution Packages (.deb/.rpm) + Uploads → waits for Phase 5
#
# All phases visible in a single GitHub Actions run page.
#
# NOTE: Phase 2 and Phase 3 use modular scripts from scripts/ci/ directory.
#       This ensures 100% parity between local testing and CI execution.
# ----------------------------------------------------------------------------

name: CI Pipeline
on: [push]

jobs:
  # ==========================================================================
  # Phase 1: Documentation & Linting
  # ==========================================================================
  test_and_document:
    name: "Phase 1: Documentation & Linting"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip doxygen
          python -m pip install --upgrade pip
          pip install -r pip_requirements.txt
          pip install -r docs/requirements.txt

      - name: Documentation build smoke test
        run: |
          cd docs
          doxygen Doxyfile
          make html
          test -f _build/html/index.html

      - name: Check for trailing whitespace and tabs
        run: |
          if grep -rnI '[[:blank:]]$' --include=\*.{c,cpp,h,sh,py} .; then
            echo "Error: Trailing whitespace found in the repository!"
            exit 1
          fi
          if grep -rnI $'\t' --include=\*.{c,cpp,h,sh,py} .; then
            echo "Error: Tab characters found in the repository! Please use spaces for indentation."
            exit 1
          fi

      - name: C/C++ Linter
        run: |
          find . -name '*.h' -o -name '*.cpp' -o -name '*.c' | xargs cpplint

  # ==========================================================================
  # Phase 2: CPU Testing (5 distros in parallel)
  # Waits for Phase 1 to complete
  # Uses modular scripts from scripts/ci/
  # ==========================================================================
  cpu_test:
    name: "Phase 2: CPU Test (${{ matrix.container }})"
    needs: [test_and_document]
    # Bound job wall-clock to 20 minutes. Belt to the 120s per-insmod
    # timeout suspenders in scripts/ci/load-modules-*.sh; a hang at any step
    # fails well before the 6-hour GitHub runner ceiling, freeing the slot
    # and letting the diagnostic artifact upload (if: failure()) fire.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # host_mounts bind-mounts the runner's kernel tree into the container
          # so install-deps.sh host-matches the ubuntu-26.04 (7.0.0) kernel and
          # can insmod into it. rockylinux:9 omits the mounts: its default gcc
          # cannot build against the 7.0.0 kernel (rejects -ftrivial-auto-var-
          # init=zero / -fmin-function-alignment=16), so it builds against its
          # own distro kernel instead (build-only, CI_HOST_MATCH=0).
          # --privileged: CAP_SYS_MODULE for insmod
          - container: "ubuntu:26.04"   # full test — matches the ubuntu-26.04 runner kernel
            load_test: true
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "ubuntu:24.04"   # smoke: build + DKMS ldtarball only
            load_test: false
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "ubuntu:22.04"   # smoke: build + DKMS ldtarball only
            load_test: false
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "rockylinux:9"   # build-only vs own kernel (gcc too old for 7.0.0)
            load_test: true
            host_mounts: ""
          - container: "debian:experimental"
            load_test: true
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "fedora:rawhide"
            load_test: true
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
    runs-on: ubuntu-26.04
    container:
      image: ${{ matrix.container }}
      options: "--privileged ${{ matrix.host_mounts }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bash scripts/ci/install-deps.sh

      - name: Display environment info
        run: |
          echo "Container: ${{ matrix.container }}"
          echo "Host kernel: $(uname -r)"
          echo "Build kernel: ${CI_KVER}"
          echo "Host match: ${CI_HOST_MATCH}"
          echo "## ${{ matrix.container }} — kernel ${CI_KVER}" >> $GITHUB_STEP_SUMMARY

      - name: Build (CPU)
        run: bash scripts/ci/build-cpu.sh

      - name: Load modules
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/load-modules-cpu.sh

      - name: Run tests
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/test-cpu.sh

      - name: Unload modules
        if: always() && matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/unload-modules-cpu.sh

      - name: Test DKMS (smoke)
        run: bash scripts/ci/test-dkms-cpu-smoke.sh

      - name: Check dmesg
        if: always()
        run: bash scripts/ci/check-dmesg.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diag
          dmesg > diag/dmesg.txt 2>&1 || true
          cp /tmp/phase3_tests.log   diag/ 2>/dev/null || true
          cp /tmp/test_params.log    diag/ 2>/dev/null || true
          cp dma_loop_output.txt     diag/ 2>/dev/null || true
          cp dma_rate_output.txt     diag/ 2>/dev/null || true
          cp emulator/driver/datadev_emulator.ko diag/ 2>/dev/null || true
          cp data_dev/driver/datadev.ko          diag/ 2>/dev/null || true
          ls -la diag/ || true

      - name: Sanitize container name for artifact
        if: failure()
        run: |
          SANITIZED=$(echo "${{ matrix.container }}" | sed 's/:/-/g; s/\//-/g')
          echo "ARTIFACT_NAME=cpu-ci-diag-${{ github.job }}-${SANITIZED}" >> $GITHUB_ENV

      - name: Upload diagnostics on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: diag/
          retention-days: 3
          if-no-files-found: ignore

      - name: Dump full dmesg on failure
        if: failure()
        run: dmesg || echo "dmesg not available (expected in container)"

  # ==========================================================================
  # Phase 3: GPU Testing (5 distros in parallel)
  # Waits for Phase 2 (all CPU tests) to complete
  # Uses modular scripts from scripts/ci/
  # ==========================================================================
  gpu_test:
    name: "Phase 3: GPU Test (${{ matrix.container }})"
    needs: [cpu_test]
    # Bound job wall-clock to 30 minutes. Belt to the 120s per-insmod
    # timeout suspenders in scripts/ci/load-modules-*.sh; a hang at any step
    # fails well before the 6-hour GitHub runner ceiling, freeing the slot
    # and letting the diagnostic artifact upload (if: failure()) fire.
    # The test phase itself completes in ~10-12 min on the slowest matrix
    # cells; the extra 10 min covers occasional post-job `docker rm --force`
    # stalls observed on GitHub-hosted runners (e.g. run 24874328424 where
    # rocky9 teardown sat idle for ~22 min after the test sequence had
    # already passed).
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # host_mounts bind-mounts the runner's kernel tree into the container
          # so install-deps.sh host-matches the ubuntu-26.04 (7.0.0) kernel and
          # can insmod into it. rockylinux:9 omits the mounts: its default gcc
          # cannot build against the 7.0.0 kernel (rejects -ftrivial-auto-var-
          # init=zero / -fmin-function-alignment=16), so it builds against its
          # own distro kernel instead (build-only, CI_HOST_MATCH=0).
          # --privileged: CAP_SYS_MODULE for insmod
          - container: "ubuntu:26.04"   # full test — matches the ubuntu-26.04 runner kernel
            load_test: true
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "ubuntu:24.04"   # smoke: build + DKMS ldtarball only
            load_test: false
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "ubuntu:22.04"   # smoke: build + DKMS ldtarball only
            load_test: false
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "rockylinux:9"   # build-only vs own kernel (gcc too old for 7.0.0)
            load_test: true
            host_mounts: ""
          - container: "debian:experimental"
            load_test: true
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
          - container: "fedora:rawhide"
            load_test: true
            host_mounts: "-v /lib/modules:/lib/modules -v /usr/src:/usr/src"
    runs-on: ubuntu-26.04
    container:
      image: ${{ matrix.container }}
      options: "--privileged ${{ matrix.host_mounts }}"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: bash scripts/ci/install-deps.sh

      - name: Display environment info
        run: |
          echo "Container: ${{ matrix.container }}"
          echo "Host kernel: $(uname -r)"
          echo "Build kernel: ${CI_KVER}"
          echo "Host match: ${CI_HOST_MATCH}"
          echo "## ${{ matrix.container }} — kernel ${CI_KVER}" >> $GITHUB_STEP_SUMMARY

      - name: Build (GPU)
        run: bash scripts/ci/build-gpu.sh

      - name: Load modules
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/load-modules-gpu.sh

      - name: Run tests
        if: matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/test-gpu.sh

      - name: Unload modules
        if: always() && matrix.load_test && env.CI_HOST_MATCH == '1'
        run: bash scripts/ci/unload-modules-gpu.sh

      - name: Test DKMS (smoke)
        run: bash scripts/ci/test-dkms-gpu-smoke.sh

      - name: Check dmesg
        if: always()
        run: bash scripts/ci/check-dmesg.sh

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p diag
          dmesg > diag/dmesg.txt 2>&1 || true
          cp /tmp/phase4_tests.log       diag/ 2>/dev/null || true
          cp dma_loop_output_gpu.txt     diag/ 2>/dev/null || true
          cp emulator/driver/datadev_emulator.ko diag/ 2>/dev/null || true
          cp emulator/gpu_stub/nvidia_p2p_stub.ko diag/ 2>/dev/null || true
          cp data_dev/driver/datadev.ko          diag/ 2>/dev/null || true
          ls -la diag/ || true

      - name: Sanitize container name for artifact
        if: failure()
        run: |
          SANITIZED=$(echo "${{ matrix.container }}" | sed 's/:/-/g; s/\//-/g')
          echo "ARTIFACT_NAME=gpu-ci-diag-${{ github.job }}-${SANITIZED}" >> $GITHUB_ENV

      - name: Upload diagnostics on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: diag/
          retention-days: 3
          if-no-files-found: ignore

      - name: Dump full dmesg on failure
        if: failure()
        run: dmesg || echo "dmesg not available (expected in container)"

  # ==========================================================================
  # Phase 4: Release Generation
  # Waits for Phase 3 (all GPU tests) to complete
  # ==========================================================================
  gen_release:
    name: "Phase 4: Generate Release"
    needs: [gpu_test]
    uses: slaclab/ruckus/.github/workflows/gen_release.yml@main
    with:
      version: '1.0.0'
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ==========================================================================
  # Phase 5: Parallel Package Generation (DKMS, DEB Loop, RPM)
  # ==========================================================================
  generate_packages:
    name: "Phase 5: Build DKMS Tarball (${{ matrix.driver_type }})"
    needs: [gen_release]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Host Python Environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.12

      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dkms
          python3 -m pip install --upgrade pip
          pip3 install -r pip_requirements.txt

      - name: Parse Packaging Metadata
        id: meta
        run: |
          TAG_VERSION=$(git describe --tags)
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT
          if [ "${{ matrix.driver_type }}" = "gpu" ]; then
            echo "suffix=-gpu" >> $GITHUB_OUTPUT
          else
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - name: Build Source DKMS Tarball
        run: |
          make -C data_dev/driver dkms

      - name: Assert DKMS tarball was produced
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
        run: |
          TARBALL="data_dev/driver/datadev${SUFFIX}-dkms-${TAG}.tar.gz"
          if [ ! -f "${TARBALL}" ]; then
            echo "ERROR: expected DKMS tarball not found: ${TARBALL}" >&2
            exit 1
          fi

      - name: Upload DKMS Source Tarball
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SUFFIX: ${{ steps.meta.outputs.suffix }}
          GIT_REPO: ${{ github.repository }}
          GH_REPO_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python3 scripts/uploadTag.py --tag=$TAG --repo=$GIT_REPO --file=data_dev/driver/datadev${SUFFIX}-dkms-${TAG}.tar.gz

  # ==========================================================================
  # Phase 6: Real Distribution Packages (.deb & .rpm)
  # ==========================================================================
  # Builds real installable DKMS packages per target:
  #   * ubuntu-22.04  -> .deb
  #   * ubuntu-24.04  -> .deb
  #   * ubuntu-26.04  -> .deb
  #   * rockylinux-9  -> .rpm
  # for both the CPU (datadev) and GPU (datadev-gpu) driver variants, then
  # uploads each built package to the GitHub release.
  #
  # The build runs inside the target distro via `docker run`, mounting the
  # already-checked-out repo (which keeps its .git, so the Makefile's
  # `git describe` versioning works correctly). Each package ships the DKMS
  # source tree under /usr/src and registers it with dkms on install.
  # ==========================================================================
  dist_packages:
    name: "Phase 6: Dist Package (${{ matrix.driver_type }} - ${{ matrix.target_env }})"
    needs: [generate_packages]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        driver_type: [cpu, gpu]
        target_env: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, rockylinux-9]
        include:
          - target_env: ubuntu-22.04
            container_image: "ubuntu:22.04"
            pkg_format: "deb"
          - target_env: ubuntu-24.04
            container_image: "ubuntu:24.04"
            pkg_format: "deb"
          - target_env: ubuntu-26.04
            container_image: "ubuntu:26.04"
            pkg_format: "deb"
          - target_env: rockylinux-9
            container_image: "rockylinux:9"
            pkg_format: "rpm"
    steps:
      # Checkout on the HOST runner so the full .git history is present and
      # gets mounted into the build container (needed by the Makefile's
      # `git describe` versioning).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Host Python Environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.12

      - name: Install Host Dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r pip_requirements.txt

      - name: Parse release tag
        id: meta
        run: |
          TAG_VERSION=$(git describe --tags)
          echo "tag=${TAG_VERSION}" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------------
      # Build .deb (Ubuntu targets)
      # ----------------------------------------------------------------------
      - name: Build Debian package
        if: matrix.pkg_format == 'deb'
        env:
          IMAGE: ${{ matrix.container_image }}
          DRIVER_TYPE: ${{ matrix.driver_type }}
          TARGET_ENV: ${{ matrix.target_env }}
        run: |
          docker run --rm \
            -e DRIVER_TYPE -e TARGET_ENV \
            -v "${PWD}":/ws -w /ws "${IMAGE}" \
            bash /ws/scripts/ci/build-deb.sh

      # ----------------------------------------------------------------------
      # Build .rpm (Rocky Linux 9 target)
      # ----------------------------------------------------------------------
      - name: Build RPM package
        if: matrix.pkg_format == 'rpm'
        env:
          IMAGE: ${{ matrix.container_image }}
          DRIVER_TYPE: ${{ matrix.driver_type }}
          TARGET_ENV: ${{ matrix.target_env }}
        run: |
          docker run --rm \
            -e DRIVER_TYPE -e TARGET_ENV \
            -v "${PWD}":/ws -w /ws "${IMAGE}" \
            bash /ws/scripts/ci/build-rpm.sh

      # ----------------------------------------------------------------------
      # Upload the built package(s) to the GitHub release
      # ----------------------------------------------------------------------
      - name: Assert and upload package to release
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          GIT_REPO: ${{ github.repository }}
          GH_REPO_TOKEN: ${{ secrets.GH_TOKEN }}
          PKG_FORMAT: ${{ matrix.pkg_format }}
          DRIVER_TYPE: ${{ matrix.driver_type }}
          TARGET_ENV: ${{ matrix.target_env }}
        run: |
          shopt -s nullglob
          if [ "${PKG_FORMAT}" = "deb" ]; then
            FILES=(data_dev/driver/*.deb)
          else
            FILES=(data_dev/driver/*.rpm)
          fi
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "ERROR: no .${PKG_FORMAT} package found for ${DRIVER_TYPE}/${TARGET_ENV}" >&2
            exit 1
          fi
          for pkg in "${FILES[@]}"; do
            echo "Uploading built asset: $pkg"
            python3 scripts/uploadTag.py --tag="$TAG" --repo="$GIT_REPO" --file="$pkg"
          done
